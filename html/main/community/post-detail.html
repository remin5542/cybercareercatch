<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자유게시판 상세</title>
  <link rel="stylesheet" href="../../../assets/css/main/community/post-detail.css">
</head>

<body>
  <!--
    Abbrev(축약어) 규칙
    fbd = Free Board Detail (이 페이지 공통 prefix)
    top = 상단 타이틀 영역
    ttl = title
    mv = move button
    pnl = panel(전체 박스)
    post = 게시글 영역
    head = 게시글 상단 영역
    info = 작성자/조회수/작성일 영역
    act = 버튼 영역
    cont = 내용 영역
    edit = 수정 영역
    cmt = 댓글 영역
    row = 한 줄 영역
    inp = input
    ta = textarea
    btn = button
  -->

  <main class="fbd-wrap">
    <div class="fbd-top">
      <h2 class="fbd-top-ttl">자유게시판</h2>
      <a href="post-list.html" class="fbd-top-mv">자유게시판 목록으로 이동하기</a>
    </div>

    <div class="fbd-pnl">
      <div class="fbd-post">
        <div class="fbd-head">
          <div class="fbd-head-top">
            <div class="fbd-post-ttl" id="postTitleView">제목</div>

            <div class="fbd-act" id="postActions">
            
              <button type="button" class="fbd-act-btn fbd-act-del" id="btnDelete">삭제</button>

              <button type="button" class="fbd-act-btn fbd-act-save" id="btnSave" style="display:none;">저장</button>
              <button type="button" class="fbd-act-btn fbd-act-cancel" id="btnCancel" style="display:none;">취소</button>
            </div>
          </div>

          <div class="fbd-info">
            <div class="fbd-info-it" id="postWriter">ID :</div>
            <div class="fbd-info-it" id="postViews">| 조회수 :</div>
            <div class="fbd-info-it" id="postDate">| 작성일 :</div>
          </div>
        </div>

        <div class="fbd-cont" id="postContentView">내용</div>

        <div class="fbd-edit" id="editArea" style="display:none;">
          <input type="text" id="editTitle" class="fbd-edit-inp" placeholder="제목">
          <textarea id="editContent" class="fbd-edit-ta" placeholder="내용"></textarea>
        </div>
      </div>

      <div class="fbd-cmt">
        <div class="fbd-cmt-list" id="commentList"></div>

        <div class="fbd-cmt-write">
          <input type="text" id="commentInput" class="fbd-cmt-inp" placeholder="댓글을 작성해주세요">
          <button type="button" id="btnComment" class="fbd-cmt-btn">입력</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../../../assets/js/main/community/post-detail.js"></script>
</body>

</html>
